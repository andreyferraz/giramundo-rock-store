<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giramundo Store | Contato</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>

    <main>
        <section class="section contact-section">
            <div class="contact-card">
                <div>
                    <p class="eyebrow">Contato</p>
                    <h2>Fale com a Giramundo</h2>
                    <p>Configure o número de WhatsApp no arquivo <code>assets/js/app.js</code> e personalize os dados da empresa.</p>
                </div>
                <div class="contact-list">
                    <p><strong>WhatsApp:</strong> <span id="displayWhatsapp">configurar no JS</span></p>
                    <p><strong>E-mail:</strong> contato@giramundo.com.br</p>
                    <p><strong>Endereço:</strong> Sua cidade, seu estado</p>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="fragments/footer :: footer"></div>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
