<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Produtos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>
    <main>
        <h1>Produtos</h1>
        <a th:href="@{/admin/products/create}">Criar novo</a>
        <table>
            <thead><tr><th>ID</th><th>Nome</th><th>Preço</th><th>Ações</th></tr></thead>
            <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.price}"></td>
                    <td>
                        <a th:href="@{'/admin/products/edit/' + ${p.id}}">Editar</a>
                        <form th:action="@{'/admin/products/delete/' + ${p.id}}" method="post" style="display:inline">
                            <button type="submit">Remover</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
