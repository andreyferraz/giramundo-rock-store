<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>
    <main>
        <h1>Financeiro</h1>
        <a th:href="@{/admin/financial/create}">Nova entrada</a>
        <table>
            <thead><tr><th>ID</th><th>Tipo</th><th>Valor</th><th>Data</th><th>Ações</th></tr></thead>
            <tbody>
                <tr th:each="e : ${entries}">
                    <td th:text="${e.id}"></td>
                    <td th:text="${e.type}"></td>
                    <td th:text="${e.amount}"></td>
                    <td th:text="${e.occurredAt}"></td>
                    <td>
                        <a th:href="@{'/admin/financial/edit/' + ${e.id}}">Editar</a>
                        <form th:action="@{'/admin/financial/delete/' + ${e.id}}" method="post" style="display:inline">
                            <button type="submit">Remover</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
