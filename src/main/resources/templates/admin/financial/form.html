<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - Formulário</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:replace="fragments/header :: header"></div>
    <main>
        <h1 th:text="${entry.id} != null ? 'Editar entrada' : 'Nova entrada'">Nova entrada</h1>
        <form th:action="@{/admin/financial/save}" method="post">
            <input type="hidden" th:field="*{id}">
            <label>Tipo
                <select th:field="*{type}">
                    <option value="IN">Entrada</option>
                    <option value="OUT">Saída</option>
                </select>
            </label>
            <label>Valor<input type="number" step="0.01" th:field="*{amount}" required></label>
            <label>Descrição<textarea th:field="*{description}"></textarea></label>
            <label>Data<input type="datetime-local" th:field="*{occurredAt}" required></label>
            <div>
                <button type="submit">Salvar</button>
                <a th:href="@{/admin/financial}">Cancelar</a>
            </div>
        </form>
    </main>
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
