<!DOCTYPE html>
<!-- Header fragment -->
<div th:fragment="header">
    <header class="site-header">
        <a th:href="@{/}" class="brand" aria-label="Giramundo Store">
            <img th:src="@{/img/logo-giramundo.png}" alt="Logo Giramundo" class="brand-logo">
            <span class="brand-text">Giramundo</span>
        </a>

        <nav class="main-nav" aria-label="Menu principal">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/sobre}">Sobre</a>
            <a th:href="@{/loja}">Loja</a>
            <a th:href="@{/contato}">Contato</a>
        </nav>

        <button class="cart-toggle" type="button" id="openCartBtn" aria-label="Abrir carrinho">
            <span>Carrinho</span>
            <strong id="cartCounter">0</strong>
        </button>
    </header>
</div>
